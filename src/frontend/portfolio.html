<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Case Portfolio — DOJ Antitrust Division</title>
    <link rel="stylesheet" href="common.css">
    <style>
        .summary-bar { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:10px; margin-bottom:20px; }
        .summary-stat { background:rgba(255,255,255,0.03); border:1px solid #2d3748; border-radius:10px; padding:14px; text-align:center; }
        .summary-stat .ss-value { font-size:1.6em; font-weight:700; color:#e2e8f0; }
        .summary-stat .ss-label { font-size:0.65em; color:#718096; text-transform:uppercase; letter-spacing:0.5px; margin-top:2px; }
        .filter-bar { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; align-items:center; }
        .filter-bar select { background:#0d1520; border:1px solid #2d3748; border-radius:6px; padding:6px 10px; color:#e2e8f0; font-size:0.78em; }
        .case-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:12px; }
        .portfolio-card { background:#1a2332; border:1px solid #2d3748; border-radius:12px; padding:16px; cursor:pointer; transition:all 0.2s; }
        .portfolio-card:hover { border-color:#48bb78; transform:translateY(-2px); }
        .pc-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:8px; }
        .pc-name { font-size:0.88em; font-weight:700; color:#e2e8f0; }
        .pc-priority { padding:2px 8px; border-radius:10px; font-size:0.62em; font-weight:600; }
        .priority-critical { background:rgba(252,129,129,0.2); color:#fc8181; }
        .priority-high { background:rgba(246,173,85,0.2); color:#f6ad55; }
        .priority-medium { background:rgba(246,224,94,0.2); color:#f6e05e; }
        .priority-low { background:rgba(113,128,150,0.2); color:#a0aec0; }
        .pc-meta { font-size:0.72em; color:#718096; margin-bottom:8px; }
        .pc-stats { display:flex; gap:12px; font-size:0.72em; color:#a0aec0; }
        .pc-strength { display:flex; align-items:center; gap:6px; margin-top:8px; }
        .strength-bar { flex:1; height:6px; background:#2d3748; border-radius:3px; overflow:hidden; }
        .strength-fill { height:100%; border-radius:3px; transition:width 0.3s; }
        .attention-card { background:rgba(252,129,129,0.04); border:1px solid rgba(252,129,129,0.15); border-radius:10px; padding:12px 16px; margin-bottom:8px; display:flex; align-items:center; gap:10px; }
        .attention-icon { font-size:1.2em; }
        .attention-text { flex:1; font-size:0.82em; color:#e2e8f0; }
        .attention-detail { font-size:0.72em; color:#718096; }
    </style>
</head>
<body>
<script src="config.js"></script>
<div class="header">
    <h1>⚖️ Case Portfolio Dashboard — <span>Antitrust Division</span></h1>
    <div class="header-right"><div class="header-badge">Manager View</div></div>
</div>
<div class="nav-bar">
    <a href="index.html" class="nav-link">🏠 Home</a>
    <a href="investigator.html" class="nav-link">📋 Cases</a>
    <a href="pipeline-config.html" class="nav-link">⚙️ Pipeline Config</a>
    <a href="batch-loader.html" class="nav-link">📦 Batch Loader</a>
    <a href="admin.html" class="nav-link">🔐 Admin</a>
    <a href="chatbot.html" class="nav-link">💬 Chat</a>
    <a href="wizard.html" class="nav-link">🧙 Wizard</a>
    <a href="portfolio.html" class="nav-link active">📊 Portfolio</a>
    <a href="workbench.html" class="nav-link">🔬 Workbench</a>
</div>
<div class="page-content">
    <!-- Summary bar -->
    <div class="summary-bar" id="summaryBar">
        <div class="summary-stat"><div class="ss-value" id="totalCases">—</div><div class="ss-label">Total Cases</div></div>
        <div class="summary-stat"><div class="ss-value" id="activeCases">—</div><div class="ss-label">Active</div></div>
        <div class="summary-stat"><div class="ss-value" id="totalDocs">—</div><div class="ss-label">Documents</div></div>
        <div class="summary-stat"><div class="ss-value" id="totalEntities">—</div><div class="ss-label">Entities</div></div>
        <div class="summary-stat"><div class="ss-value" id="attentionCount">—</div><div class="ss-label">Needs Attention</div></div>
    </div>

    <!-- Filters -->
    <div class="filter-bar">
        <select id="filterStatus" onchange="loadCases()"><option value="">All Statuses</option><option value="created">Created</option><option value="ingesting">Ingesting</option><option value="indexed">Indexed</option><option value="investigating">Investigating</option><option value="archived">Archived</option></select>
        <select id="filterPriority" onchange="loadCases()"><option value="">All Priorities</option><option value="critical">Critical</option><option value="high">High</option><option value="medium">Medium</option><option value="low">Low</option></select>
        <select id="sortBy" onchange="loadCases()"><option value="last_activity">Last Activity</option><option value="created_at">Created</option><option value="name">Name</option><option value="document_count">Documents</option><option value="strength_score">Strength</option></select>
    </div>

    <!-- Cases grid -->
    <div class="case-grid" id="caseGrid"><div class="loading"><span class="spinner"></span> Loading portfolio...</div></div>

    <!-- Attention section -->
    <div class="section-card" style="margin-top:20px;">
        <h3>⚠️ Cases Requiring Attention</h3>
        <div id="attentionList"><div class="loading"><span class="spinner"></span> Loading...</div></div>
    </div>
</div>

<script>
const API_URL = window.APP_CONFIG ? window.APP_CONFIG.API_URL : 'https://edb025my3i.execute-api.us-east-1.amazonaws.com/v1';
async function api(method, path, body) {
    const opts = { method, headers: {'Content-Type':'application/json'} };
    if (body) opts.body = JSON.stringify(body);
    const resp = await fetch(API_URL + path, opts);
    return resp.json();
}

async function loadSummary() {
    try {
        const data = await api('GET', '/case-files');
        const cases = data.case_files || [];
        document.getElementById('totalCases').textContent = cases.length;
        document.getElementById('activeCases').textContent = cases.filter(c => c.status !== 'archived').length;
        const totalDocs = cases.reduce((s,c) => s + (c.document_count||0), 0);
        const totalEnts = cases.reduce((s,c) => s + (c.entity_count||0), 0);
        document.getElementById('totalDocs').textContent = totalDocs.toLocaleString();
        document.getElementById('totalEntities').textContent = totalEnts.toLocaleString();
    } catch(e) {}
}

async function loadCases() {
    const status = document.getElementById('filterStatus').value;
    const priority = document.getElementById('filterPriority').value;
    const sortBy = document.getElementById('sortBy').value;
    try {
        const data = await api('GET', '/case-files');
        let cases = data.case_files || [];
        if (status) cases = cases.filter(c => c.status === status);
        // Sort
        cases.sort((a,b) => {
            if (sortBy === 'name') return (a.topic_name||'').localeCompare(b.topic_name||'');
            if (sortBy === 'document_count') return (b.document_count||0) - (a.document_count||0);
            return new Date(b.created_at||0) - new Date(a.created_at||0);
        });

        let h = '';
        cases.forEach(c => {
            const pClass = 'priority-' + (c.priority || 'medium');
            const strength = c.strength_score || 0;
            const sColor = strength > 60 ? '#48bb78' : strength > 30 ? '#f6e05e' : '#fc8181';
            h += '<div class="portfolio-card" onclick="window.location.href=\'investigator.html?case='+c.case_id+'\'">';
            h += '<div class="pc-header"><div class="pc-name">'+esc(c.topic_name)+'</div>';
            h += '<span class="pc-priority '+pClass+'">'+(c.priority||'medium')+'</span></div>';
            h += '<div class="pc-meta">'+c.status+' · Created '+new Date(c.created_at).toLocaleDateString()+'</div>';
            h += '<div class="pc-stats"><span>📄 '+(c.document_count||0)+' docs</span><span>🔗 '+(c.entity_count||0)+' entities</span></div>';
            if (strength > 0) {
                h += '<div class="pc-strength"><span style="font-size:0.72em;color:'+sColor+';font-weight:700;">'+strength+'</span>';
                h += '<div class="strength-bar"><div class="strength-fill" style="width:'+strength+'%;background:'+sColor+';"></div></div></div>';
            }
            h += '</div>';
        });
        document.getElementById('caseGrid').innerHTML = h || '<div style="color:#718096;font-size:0.82em;">No cases match filters.</div>';
        document.getElementById('attentionCount').textContent = '0';
    } catch(e) {
        document.getElementById('caseGrid').innerHTML = '<div style="color:#fc8181;">Failed to load cases</div>';
    }
}

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

loadSummary();
loadCases();
</script>
</body>
</html>
