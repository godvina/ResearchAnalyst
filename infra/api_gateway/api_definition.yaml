components:
  schemas:
    # --- Request Schemas ---

    CreateCaseFileRequest:
      type: object
      required: [topic_name, description]
      properties:
        topic_name:
          type: string
          maxLength: 255
        description:
          type: string
        parent_case_id:
          type: string
          format: uuid

    IngestRequest:
      type: object
      required: [files]
      properties:
        files:
          type: array
          minItems: 1
          items:
            type: object
            required: [filename, content_base64]
            properties:
              filename:
                type: string
              content_base64:
                type: string
                format: byte

    SearchRequest:
      type: object
      required: [query]
      properties:
        query:
          type: string
        top_k:
          type: integer
          default: 10
          minimum: 1

    DrillDownRequest:
      type: object
      required: [topic_name, description]
      properties:
        topic_name:
          type: string
          maxLength: 255
        description:
          type: string
        entity_names:
          type: array
          items:
            type: string
        pattern_id:
          type: string

    CrossCaseAnalyzeRequest:
      type: object
      required: [case_ids]
      properties:
        case_ids:
          type: array
          minItems: 2
          items:
            type: string
            format: uuid

    CreateCrossCaseGraphRequest:
      type: object
      required: [name, case_ids]
      properties:
        name:
          type: string
          maxLength: 255
        case_ids:
          type: array
          minItems: 2
          items:
            type: string
            format: uuid

    UpdateCrossCaseGraphRequest:
      type: object
      properties:
        add_case_ids:
          type: array
          items:
            type: string
            format: uuid
        remove_case_ids:
          type: array
          items:
            type: string
            format: uuid

    # --- Response Schemas ---

    CaseFileResponse:
      type: object
      properties:
        case_id:
          type: string
          format: uuid
        topic_name:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [created, ingesting, indexed, investigating, archived, error]
        created_at:
          type: string
          format: date-time
        parent_case_id:
          type: string
          format: uuid
          nullable: true
        s3_prefix:
          type: string
        neptune_subgraph_label:
          type: string
        document_count:
          type: integer
        entity_count:
          type: integer
        relationship_count:
          type: integer
        findings:
          type: array
          items: {}
        last_activity:
          type: string
          format: date-time
          nullable: true
        error_details:
          type: string
          nullable: true
        requestId:
          type: string

    CaseFileListResponse:
      type: object
      properties:
        case_files:
          type: array
          items:
            $ref: "#/components/schemas/CaseFileResponse"
        requestId:
          type: string

    DeleteResponse:
      type: object
      properties:
        deleted:
          type: boolean
        case_id:
          type: string
          format: uuid
        requestId:
          type: string

    BatchResultResponse:
      type: object
      properties:
        case_file_id:
          type: string
          format: uuid
        total_documents:
          type: integer
        successful:
          type: integer
        failed:
          type: integer
        document_count:
          type: integer
        entity_count:
          type: integer
        relationship_count:
          type: integer
        failures:
          type: array
          items:
            type: object
            properties:
              document_id:
                type: string
              error:
                type: string
        requestId:
          type: string

    Pattern:
      type: object
      properties:
        pattern_id:
          type: string
        entities_involved:
          type: array
          items:
            type: object
        connection_type:
          type: string
        explanation:
          type: string
        confidence_score:
          type: number
          minimum: 0
          maximum: 1
        novelty_score:
          type: number
          minimum: 0
          maximum: 1
        source_documents:
          type: array
          items:
            type: string

    PatternReportResponse:
      type: object
      properties:
        report_id:
          type: string
        case_file_id:
          type: string
          format: uuid
        patterns:
          type: array
          items:
            $ref: "#/components/schemas/Pattern"
        graph_patterns_count:
          type: integer
        vector_patterns_count:
          type: integer
        combined_count:
          type: integer
        requestId:
          type: string

    PatternReportListResponse:
      type: object
      properties:
        reports:
          type: array
          items:
            $ref: "#/components/schemas/PatternReportResponse"
        requestId:
          type: string

    SearchResult:
      type: object
      properties:
        document_id:
          type: string
        passage:
          type: string
        relevance_score:
          type: number
          minimum: 0
          maximum: 1
        source_document_ref:
          type: string
        surrounding_context:
          type: string

    SearchResultListResponse:
      type: object
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/SearchResult"
        requestId:
          type: string

    CrossCaseMatch:
      type: object
      properties:
        entity_a:
          type: object
        entity_b:
          type: object
        similarity_score:
          type: number
          minimum: 0
          maximum: 1
        ai_explanation:
          type: string

    CrossReferenceReportResponse:
      type: object
      properties:
        report_id:
          type: string
        case_ids:
          type: array
          items:
            type: string
            format: uuid
        shared_entities:
          type: array
          items:
            $ref: "#/components/schemas/CrossCaseMatch"
        parallel_patterns:
          type: array
          items:
            type: object
        ai_analysis:
          type: string
        requestId:
          type: string

    CrossCaseGraphResponse:
      type: object
      properties:
        graph_id:
          type: string
          format: uuid
        name:
          type: string
        linked_case_ids:
          type: array
          items:
            type: string
            format: uuid
        created_at:
          type: string
          format: date-time
        neptune_subgraph_label:
          type: string
        analyst_notes:
          type: string
        status:
          type: string
        requestId:
          type: string

    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
        requestId:
          type: string
