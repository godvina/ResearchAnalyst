openapi: "3.0.1"
info:
  title: Research Analyst Platform API
  description: API for managing research case files, ingestion, pattern discovery, semantic search, drill-down investigation, cross-case analysis, pipeline configuration, and investigative tools.
  version: "1.0.0"

paths:
  /case-files:
    post:
      summary: Create a new case file
      operationId: createCaseFile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCaseFileRequest"
      responses:
        "201":
          description: Case file created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaseFileResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      x-amazon-apigateway-integration:
        type: aws_proxy
        httpMethod: POST
        uri: "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${CaseFilesLambdaArn}/invocations"
    get:
      summary: List case files with optional filters
      operationId: listCaseFiles
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [created, ingesting, indexed, investigating, archived, error]
        - name: topic_keyword
          in: query
          schema:
            type: string
        - name: date_from
          in: query
          schema:
            type: string
            format: date-time
        - name: date_to
          in: query
          schema:
            type: string
            format: date-time
        - name: entity_count_min
          in: query
          schema:
            type: integer
        - name: entity_count_max
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of case files
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaseFileListResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      x-amazon-apigateway-integration:
        type: aws_proxy
        httpMethod: POST
        uri: "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${CaseFilesLambdaArn}/invocations"
    options:
      summary: CORS preflight for /case-files
      operationId: optionsCaseFiles
      responses:
        "200":
          description: CORS preflight response
      x-amazon-apigateway-integration:
        type: aws_proxy
        httpMethod: POST
        uri: "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${CaseFilesLambdaArn}/invocations"

  /case-files/{id}:
    get:
      summary: Get case file details
      operationId: getCaseFile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Case file details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaseFileResponse"
        "404":
          description: Case file not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      x-amazon-apigateway-integration:
        type: aws_proxy
        httpMethod: POST
        uri: "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${CaseFilesLambdaArn}/invocations"
    delete:
      summary: Delete case file and all associated data
      operationId: deleteCaseFile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Case file deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResponse"
        "404":
          description: Case file not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      x-amazon-apigateway-integration:
        type: aws_proxy
        httpMethod: POST
        uri: "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${CaseFilesLambdaArn}/invocations"
    options:
      summary: CORS preflight for /case-files/{id}
      operationId: optionsCaseFileById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: CORS preflight response
      x-amazon-apigateway-integration:
        type: aws_proxy
        httpMethod: POST
        uri: "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${CaseFilesLambdaArn}/invocations"

  /case-files/{id}/archive:
    post:
      summary: Archive a case file
      operationId: archiveCaseFile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Case file archived
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaseFileResponse"
        "404":
          description: Case file not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      x-amazon-apigateway-integration:
        type: aws_proxy
        httpMethod: POST
        uri: "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${CaseFilesLambdaArn}/invocations"
    options:
      summary: CORS preflight for /case-files/{id}/archive
      operationId: optionsArchiveCaseFile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: CORS preflight response
      x-amazon-apigateway-integration:
        type: aws_proxy
        httpMethod: POST
        uri: "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${CaseFilesLambdaArn}/invocations"

  /case-files/{id}/ingest:
    post:
      summary: Upload and ingest documents into a case file
      operationId: ingestDocuments
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IngestRequest"
      responses:
        "200":
          description: Batch ingestion result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchResultResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Case file not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      x-amazon-apigateway-integration:
        type: aws_proxy
        httpMethod: POST
        uri: "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${IngestionLambdaArn}/invocations"
    options:
      summary: CORS preflight for /case-files/{id}/ingest
      operationId: optionsIngestDocuments
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: CORS preflight response
      x-amazon-apigateway-integration:
        type: aws_proxy
        httpMethod: POST
        uri: "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${IngestionLambdaArn}/invocations"

  /case-files/{id}/patterns:
    post:
      summary: Trigger pattern discovery for a case file
      operationId: discoverPatterns
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Pattern report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatternReportResponse"
        "404":
          description: Case file not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      x-amazon-apigateway-integration:
        type: aws_proxy
        httpMethod: POST
        uri: "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${PatternsLambdaArn}/invocations"
    get:
      summary: Get pattern reports for a case file
      operationId: getPatterns
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: List of pattern reports
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatternReportListResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      x-amazon-apigateway-integration:
        type: aws_proxy
        httpMethod: POST
        uri: "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${PatternsLambdaArn}/invocations"
    options:
      summary: CORS preflight for /case-files/{id}/patterns
      operationId: optionsPatterns
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: CORS preflight response
      x-amazon-apigateway-integration:
        type: aws_proxy
        httpMethod: POST
        uri: "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${PatternsLambdaArn}/invocations"

  /case-files/{id}/search:
    post:
      summary: Semantic search within a case file
      operationId: semanticSearch
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SearchRequest"
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResultListResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      x-amazon-apigateway-integration:
        type: aws_proxy
        httpMethod: POST
        uri: "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${SearchLambdaArn}/invocations"
    options:
      summary: CORS preflight for /case-files/{id}/search
      operationId: optionsSearch
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: CORS preflight response
      x-amazon-apigateway-integration:
        type: aws_proxy
        httpMethod: POST
        uri: "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${SearchLambdaArn}/invocations"

  /case-files/{id}/drill-down:
    post:
      summary: Create a sub-case file from a pattern or entity
      operationId: drillDown
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DrillDownRequest"
      responses:
        "201":
          description: Sub-case file created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaseFileResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Parent case file not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      x-amazon-apigateway-integration:
        type: aws_proxy
        httpMethod: POST
        uri: "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${DrillDownLambdaArn}/invocations"
    options:
      summary: CORS preflight for /case-files/{id}/drill-down
      operationId: optionsDrillDown
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: CORS preflight response
      x-amazon-apigateway-integration:
        type: aws_proxy
        httpMethod: POST
        uri: "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${DrillDownLambdaArn}/invocations"

  /case-files/{id}/question-answer:
    post:
      summary: Generate progressive intelligence answer for an investigative question
      operationId: questionAnswer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [entity_name, question]
              properties:
                entity_name:
                  type: string
                question:
                  type: string
                level:
                  type: integer
                  enum: [1, 2, 3]
                  default: 2
      responses:
        "200":
          description: Intelligence answer generated
        "400":
          description: Validation error
        "500":
          description: Internal error
      x-amazon-apigateway-integration:
        type: aws_proxy
        httpMethod: POST
        uri: "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${CaseFilesLambdaArn}/invocations"
    options:
      summary: CORS preflight for /case-files/{id}/question-answer
      operationId: optionsQuestionAnswer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: CORS preflight response
      x-amazon-apigateway-integration:
        type: aws_proxy
        httpMethod: POST
        uri: "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${CaseFilesLambdaArn}/invocations"

  /cross-case/analyze:
    post:
      summary: Run cross-case analysis on selected case files
      operationId: analyzeCrossCase
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CrossCaseAnalyzeRequest"
      responses:
        "200":
          description: Cross-reference report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CrossReferenceReportResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Case file not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      x-amazon-apigateway-integration:
        type: aws_proxy
        httpMethod: POST
        uri: "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${CrossCaseLambdaArn}/invocations"
    options:
      summary: CORS preflight for /cross-case/analyze
      operationId: optionsCrossCaseAnalyze
      responses:
        "200":
          description: CORS preflight response
      x-amazon-apigateway-integration:
        type: aws_proxy
        httpMethod: POST
        uri: "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${CrossCaseLambdaArn}/invocations"

  /cross-case/graphs:
    post:
      summary: Create a cross-case graph
      operationId: createCrossCaseGraph
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCrossCaseGraphRequest"
      responses:
        "201":
          description: Cross-case graph created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CrossCaseGraphResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      x-amazon-apigateway-integration:
        type: aws_proxy
        httpMethod: POST
        uri: "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${CrossCaseLambdaArn}/invocations"
    options:
      summary: CORS preflight for /cross-case/graphs
      operationId: optionsCrossCaseGraphs
      responses:
        "200":
          description: CORS preflight response
      x-amazon-apigateway-integration:
        type: aws_proxy
        httpMethod: POST
        uri: "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${CrossCaseLambdaArn}/invocations"

  /cross-case/graphs/{id}:
    patch:
      summary: Update cross-case graph membership
      operationId: updateCrossCaseGraph
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCrossCaseGraphRequest"
      responses:
        "200":
          description: Cross-case graph updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CrossCaseGraphResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Graph not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      x-amazon-apigateway-integration:
        type: aws_proxy
        httpMethod: POST
        uri: "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${CrossCaseLambdaArn}/invocations"
    get:
      summary: Get cross-case graph details
      operationId: getCrossCaseGraph
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Cross-case graph details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CrossCaseGraphResponse"
        "404":
          description: Graph not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      x-amazon-apigateway-integration:
        type: aws_proxy
        httpMethod: POST
        uri: "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${CrossCaseLambdaArn}/invocations"
    options:
      summary: CORS preflight for /cross-case/graphs/{id}
      operationId: optionsCrossCaseGraphById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: CORS preflight response
      x-amazon-apigateway-integration:
        type: aws_proxy
        httpMethod: POST
        uri: "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${CrossCaseLambdaArn}/invocations"

  # --- Prosecutor Case Review Routes ---

  /case-files/{id}/element-assessment:
    post:
      summary: Run element assessment for a case against a statute
      operationId: runElementAssessment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Element assessment result
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Case file not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      x-amazon-apigateway-integration:
        type: aws_proxy
        httpMethod: POST
        uri: "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${CaseFilesLambdaArn}/invocations"
    options:
      summary: CORS preflight for /case-files/{id}/element-assessment
      operationId: optionsElementAssessment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: CORS preflight response
      x-amazon-apigateway-integration:
        type: aws_proxy
        httpMethod: POST
        uri: "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${CaseFilesLambdaArn}/invocations"

  /case-files/{id}/decisions:
    get:
      summary: List all decisions for a case
      operationId: listCaseDecisions
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: decision_type
          in: query
          schema:
            type: string
        - name: state
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of decisions
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      x-amazon-apigateway-integration:
        type: aws_proxy
        httpMethod: POST
        uri: "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${CaseFilesLambdaArn}/invocations"
    post:
      summary: Create a decision for a case
      operationId: createCaseDecision
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "201":
          description: Decision created
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      x-amazon-apigateway-integration:
        type: aws_proxy
        httpMethod: POST
        uri: "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${CaseFilesLambdaArn}/invocations"
    options:
      summary: CORS preflight for /case-files/{id}/decisions
      operationId: optionsCaseDecisions
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: CORS preflight response
      x-amazon-apigateway-integration:
        type: aws_proxy
        httpMethod: POST
        uri: "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${CaseFilesLambdaArn}/invocations"

  /case-files/{id}/charging-memo:
    post:
      summary: Generate charging memo for a case
      operationId: generateChargingMemo
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Charging memo generated
        "404":
          description: Case file not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      x-amazon-apigateway-integration:
        type: aws_proxy
        httpMethod: POST
        uri: "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${CaseFilesLambdaArn}/invocations"
