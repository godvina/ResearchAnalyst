AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  Investigative Case Management Platform — generated by Pipeline Configuration Wizard.
  Deploys the complete serverless infrastructure stack.
  Generated: {{GENERATED_TIMESTAMP}}

# ============================================================================
# Parameters — only 5 required inputs for deployment
# ============================================================================
Parameters:
  EnvironmentName:
    Type: String
    Default: prod
    Description: Prefix for all resource names (e.g., prod, staging, dev)
    AllowedPattern: '[a-z0-9-]+'
    MaxLength: 20

  AdminEmail:
    Type: String
    Description: Email address for SNS alarm notifications and initial admin user
    AllowedPattern: '[^@]+@[^@]+\.[^@]+'

  VpcCidr:
    Type: String
    Default: '10.0.0.0/16'
    Description: CIDR block for the VPC
    AllowedPattern: '(\d{1,3}\.){3}\d{1,3}/\d{1,2}'

  DeploymentBucketName:
    Type: String
    Description: S3 bucket containing the Lambda code zip

  LambdaCodeKey:
    Type: String
    Default: deployments/lambda-code.zip
    Description: S3 key for the Lambda deployment package

# ============================================================================
# Resources
# ============================================================================
Resources:

  # --------------------------------------------------------------------------
  # Networking — VPC, Subnets, NAT Gateway, VPC Endpoints
  # --------------------------------------------------------------------------

  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-investigator-vpc'

  # Private subnets across 2 AZs for Aurora, Neptune, Lambda
  PrivateSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Select [0, !Cidr [!Ref VpcCidr, 4, 8]]
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-private-a'

  PrivateSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Select [1, !Cidr [!Ref VpcCidr, 4, 8]]
      AvailabilityZone: !Select [1, !GetAZs '']
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-private-b'

  # Public subnet for NAT Gateway
  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Select [2, !Cidr [!Ref VpcCidr, 4, 8]]
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-public'

  # Internet Gateway and NAT Gateway for outbound access
  InternetGateway:
    Type: AWS::EC2::InternetGateway

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  NATGatewayEIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc

  NATGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NATGatewayEIP.AllocationId
      SubnetId: !Ref PublicSubnet

  # TODO: Route tables for private/public subnets
  # TODO: VPC Endpoints for Bedrock, Secrets Manager, S3 Gateway, AOSS

  # --------------------------------------------------------------------------
  # Database — Aurora Serverless v2 (PostgreSQL + pgvector)
  # --------------------------------------------------------------------------
  AuroraSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: !Sub '${EnvironmentName} Aurora subnets'
      SubnetIds:
        - !Ref PrivateSubnetA
        - !Ref PrivateSubnetB

  AuroraCluster:
    Type: AWS::RDS::DBCluster
    Properties:
      Engine: aurora-postgresql
      EngineVersion: '15.4'
      DatabaseName: investigator
      MasterUsername: dbadmin
      ManageMasterUserPassword: true
      ServerlessV2ScalingConfiguration:
        MinCapacity: {{MIN_ACU}}
        MaxCapacity: {{MAX_ACU}}
      DBSubnetGroupName: !Ref AuroraSubnetGroup
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-aurora'

  AuroraInstance:
    Type: AWS::RDS::DBInstance
    Properties:
      DBClusterIdentifier: !Ref AuroraCluster
      DBInstanceClass: db.serverless
      Engine: aurora-postgresql

  # TODO: RDS Proxy for connection pooling
  # TODO: Secrets Manager secret for Aurora credentials

  # --------------------------------------------------------------------------
  # Database — Neptune Serverless (Knowledge Graph)
  # --------------------------------------------------------------------------
  NeptuneSubnetGroup:
    Type: AWS::Neptune::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: !Sub '${EnvironmentName} Neptune subnets'
      SubnetIds:
        - !Ref PrivateSubnetA
        - !Ref PrivateSubnetB

  NeptuneCluster:
    Type: AWS::Neptune::DBCluster
    Properties:
      DBSubnetGroupName: !Ref NeptuneSubnetGroup
      ServerlessScalingConfiguration:
        MinCapacity: {{MIN_NCU}}
        MaxCapacity: {{MAX_NCU}}
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-neptune'

  NeptuneInstance:
    Type: AWS::Neptune::DBInstance
    Properties:
      DBClusterIdentifier: !Ref NeptuneCluster
      DBInstanceClass: db.serverless

  # --------------------------------------------------------------------------
  # Search — OpenSearch Serverless (Vector + Keyword Search)
  # --------------------------------------------------------------------------
  # NOTE: OpenSearch Serverless collections require encryption, network,
  # and data access policies. Minimum {{MIN_OCU}} OCUs for {{SEARCH_TIER}} tier.

  # TODO: AWS::OpenSearchServerless::Collection
  # TODO: AWS::OpenSearchServerless::SecurityPolicy (encryption)
  # TODO: AWS::OpenSearchServerless::SecurityPolicy (network)
  # TODO: AWS::OpenSearchServerless::AccessPolicy (data access)
  # TODO: AOSS VPC Endpoint

  # --------------------------------------------------------------------------
  # Storage — S3 Buckets
  # --------------------------------------------------------------------------
  DataBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${EnvironmentName}-investigator-data-${AWS::AccountId}'
      LifecycleConfiguration:
        Rules:
          - Id: TransitionToIA
            Status: Enabled
            Transitions:
              - StorageClass: STANDARD_IA
                TransitionInDays: 90
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-data'

  WebsiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${EnvironmentName}-investigator-web-${AWS::AccountId}'
      WebsiteConfiguration:
        IndexDocument: investigator.html

  # --------------------------------------------------------------------------
  # CDN — CloudFront Distribution for Frontend
  # --------------------------------------------------------------------------
  # TODO: CloudFront Distribution pointing to WebsiteBucket
  # TODO: CloudFront Origin Access Identity

  # --------------------------------------------------------------------------
  # IAM — Lambda Execution Role
  # --------------------------------------------------------------------------
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${EnvironmentName}-lambda-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Sub 'arn:{{PARTITION}}:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole'
      Policies:
        - PolicyName: InvestigatorLambdaPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt DataBucket.Arn
                  - !Sub '${DataBucket.Arn}/*'
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                Resource: '*'
              - Effect: Allow
                Action:
                  - neptune-db:*
                Resource: '*'
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: '*'

  # --------------------------------------------------------------------------
  # Compute — Lambda Functions
  # --------------------------------------------------------------------------
  # API handler Lambda (routes all API Gateway requests)
  ApiHandlerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${EnvironmentName}-api-handler'
      Runtime: python3.12
      Handler: src/lambdas/api/case_files.dispatch_handler
      Code:
        S3Bucket: !Ref DeploymentBucketName
        S3Key: !Ref LambdaCodeKey
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 60
      MemorySize: 512
      VpcConfig:
        SubnetIds:
          - !Ref PrivateSubnetA
          - !Ref PrivateSubnetB
        SecurityGroupIds: []  # TODO: Lambda security group

  # TODO: Additional Lambda functions for each API domain:
  #   - wizard-handler, chat-handler, pipeline-config-handler
  #   - portfolio-handler, workbench-handler, assessment-handler
  # TODO: Ingestion pipeline Lambda functions:
  #   - upload-handler, resolve-config-handler, embed-handler
  #   - graph-load-handler, rekognition-handler

  # --------------------------------------------------------------------------
  # Orchestration — Step Functions State Machine
  # --------------------------------------------------------------------------
  # TODO: AWS::StepFunctions::StateMachine
  #   - Definition from infra/step_functions/ingestion_pipeline.json
  #   - Includes: ResolveConfig → Parse → Rekognition (optional) →
  #     Extract → Embed → GraphLoad → StoreArtifact

  # --------------------------------------------------------------------------
  # API — API Gateway REST API
  # --------------------------------------------------------------------------
  # TODO: AWS::ApiGateway::RestApi
  #   - Definition from infra/api_gateway/api_definition.yaml
  #   - All routes wired to appropriate Lambda functions
  #   - CORS enabled on all endpoints

  # --------------------------------------------------------------------------
  # Monitoring — CloudWatch Alarms + SNS
  # --------------------------------------------------------------------------
  AlarmTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub '${EnvironmentName}-investigator-alarms'
      Subscription:
        - Protocol: email
          Endpoint: !Ref AdminEmail

  LambdaErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${EnvironmentName}-lambda-errors'
      AlarmDescription: Lambda function error rate exceeded threshold
      Namespace: AWS/Lambda
      MetricName: Errors
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 2
      Threshold: 10
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref AlarmTopic

  # TODO: Additional CloudWatch alarms:
  #   - Aurora CPU utilization > 80%
  #   - Neptune query latency > 5s
  #   - Step Functions execution failures
  #   - API Gateway 5xx error rate > 1%

  # --------------------------------------------------------------------------
  # Initialization — Custom Resource for Schema + Frontend Deploy
  # --------------------------------------------------------------------------
  # TODO: Custom resource Lambda that runs on stack creation to:
  #   1. Create Aurora database schema (all tables)
  #   2. Seed system default Pipeline_Config
  #   3. Upload investigator.html to WebsiteBucket with API URL injected

# ============================================================================
# Outputs
# ============================================================================
Outputs:
  InvestigatorURL:
    Description: URL for the investigator frontend interface
    Value: !Sub 'https://${WebsiteBucket}.s3-website-${AWS::Region}.amazonaws.com'

  ApiGatewayURL:
    Description: API Gateway endpoint URL
    Value: !Sub 'https://${AWS::StackName}-api.execute-api.${AWS::Region}.amazonaws.com/v1'

  S3DataBucket:
    Description: S3 bucket for case document uploads
    Value: !Ref DataBucket

  AuroraEndpoint:
    Description: Aurora cluster endpoint for database administration
    Value: !GetAtt AuroraCluster.Endpoint.Address

  NeptuneEndpoint:
    Description: Neptune cluster endpoint for graph database administration
    Value: !GetAtt NeptuneCluster.Endpoint
